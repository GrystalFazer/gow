<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Alice ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Trebuchet MS',sans-serif;
    min-height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#f8d7da,#fdecef,#fff8f8);
}

.card{
    width:min(90%,700px);
    text-align:center;
    background:rgba(255,255,255,0.75);
    backdrop-filter:blur(15px);
    padding:40px;
    border-radius:35px;
    box-shadow:0 15px 40px rgba(0,0,0,.08);
    position:relative;
}

.kitty{
    width:220px;
    border-radius:20px;
    margin-bottom:20px;
    transition:0.3s;
}

h1{
    color:#c97b84;
    font-size:3rem;
}

.question{
    margin:25px 0;
    color:#7a4f56;
    font-size:1.8rem;
    font-weight:700;
}

button{
    border:none;
    border-radius:999px;
    padding:15px 35px;
    margin:10px;
    cursor:pointer;
    font-size:20px;
    font-weight:bold;
    transition:.2s;
}

#yesBtn{
    background:#e5989b;
    color:white;
}

#noBtn{
    background:white;
    color:#c97b84;
    position:fixed;
    z-index:999;
}

button:hover{
    transform:scale(1.05);
}

/* toast */
.toast{
    position:fixed;
    top:40px;
    left:50%;
    transform:translateX(-50%);
    background:white;
    padding:10px 18px;
    border-radius:999px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    color:#c97b84;
    z-index:999;
}

/* love bar */
.bar{
    width:100%;
    height:14px;
    background:#f5d6d9;
    border-radius:999px;
    margin-top:15px;
    overflow:hidden;
}

.fill{
    height:100%;
    width:0%;
    background:#e5989b;
    transition:0.3s;
}
</style>
</head>

<body>

<div class="card">

    <img id="kittyImg"
        class="kitty"
        src="https://raw.githubusercontent.com/GrystalFazer/gow/main/Tiny%20Confused%20Cutie.jpg">

    <h1>Aliceeyyyyyyyyyyyyyy ❤️</h1>

    <div class="question">
        Will you go on a date with me? 🌹
    </div>

    <div class="bar">
        <div class="fill" id="loveFill"></div>
    </div>

    <button id="yesBtn" onclick="yesAnswer()">Yes ❤️</button>
    <button id="noBtn" onclick="noClick()">No 🥺</button>

</div>

<script>

/* IMAGES */
const images = [
    "https://raw.githubusercontent.com/GrystalFazer/gow/main/Tiny%20Confused%20Cutie.jpg", // 0 start
    "https://raw.githubusercontent.com/GrystalFazer/gow/main/kittyrose.jpg",                     // 1
    "https://raw.githubusercontent.com/GrystalFazer/gow/main/Coquette%20Kitty.jpg",        // 2
    "https://raw.githubusercontent.com/GrystalFazer/gow/main/Tiny%20Confused%20Cutie.jpg",                       // 3 (add if you have)
    "https://raw.githubusercontent.com/GrystalFazer/gow/main/Coquette%20Kitty.jpg",                       // 4 (add if you have)
    "https://raw.githubusercontent.com/GrystalFazer/gow/main/Heart%20Meme%20Funny.jpg"          // 5 final YES
];


images.forEach(src=>{
    const img=new Image();
    img.src=src;
});

const kitty=document.getElementById("kittyImg");
const noBtn=document.getElementById("noBtn");
const loveFill=document.getElementById("loveFill");

let noCount=0;

/* messages */
const messages=[
"hehe 😸",
"you missed me 💕",
"almost! 🌸",
"nope 🐾",
"try harder 😳",
"still running 🎀",
"catch me if you can 😼"
];

function showToast(text){
    const t=document.createElement("div");
    t.className="toast";
    t.innerText=text;
    document.body.appendChild(t);
    setTimeout(()=>t.remove(),1200);
}

/* SAFE MOVE (never outside screen) */
function moveButton(){

    const padding = 20;

    const rect = noBtn.getBoundingClientRect();

    const maxX = window.innerWidth - rect.width - padding;
    const maxY = window.innerHeight - rect.height - padding;

    const x = padding + Math.random() * Math.max(50, maxX);
    const y = padding + Math.random() * Math.max(50, maxY);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}

/* NO CLICK GAME */
function noClick(){

    noCount++;

    kitty.src = images[Math.min(noCount,4)];

    showToast(messages[Math.floor(Math.random()*messages.length)]);

    moveButton();

    loveFill.style.width = Math.min(noCount*12,100) + "%";

    noBtn.innerText = noCount > 5 ? "PLEASE 🥺" : "No 🥺";
}

/* YES */
function yesAnswer(){

    kitty.src = images[5];

    document.body.innerHTML=`
    <div style="text-align:center;color:#8b5e66;padding:40px;">
        <img src="${images[5]}" style="width:260px;border-radius:20px;">
        <h1 style="margin-top:20px;">YAYYYY ❤️</h1>
        <h2>Alice said YES 🌹</h2>
        <p style="margin-top:20px;font-size:1.3rem;">
            The kitty is very happy 🐾💕
        </p>
        <div style="font-size:50px;margin-top:25px;">
            😸💖🐾💖😻
        </div>
    </div>`;
}

</script>

</body>
</html>
