<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Alice ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: 'Trebuchet MS', sans-serif;
    min-height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(
        135deg,
        #f8d7da,
        #fdecef,
        #fff8f8
    );
}

.card{
    width:min(90%,700px);
    text-align:center;
    background:rgba(255,255,255,0.7);
    backdrop-filter:blur(15px);
    padding:40px;
    border-radius:35px;
    box-shadow:0 15px 40px rgba(0,0,0,.08);
}

.bear{
    width:180px;
    border-radius:20px;
    margin-bottom:20px;
}

h1{
    color:#c97b84;
    font-size:3rem;
}

.subtitle{
    margin-top:10px;
    color:#9d6b73;
    font-size:1.1rem;
}

.question{
    margin:25px 0;
    color:#7a4f56;
    font-size:1.8rem;
    font-weight:700;
}

button{
    border:none;
    border-radius:999px;
    padding:15px 35px;
    margin:10px;
    cursor:pointer;
    font-size:20px;
    transition:.25s;
}

#yesBtn{
    background:#e5989b;
    color:white;
}

#yesBtn:hover{
    transform:scale(1.08);
}

#noBtn{
    background:white;
    color:#c97b84;
}

.floating{
    position:absolute;
    font-size:24px;
    animation:float 7s linear infinite;
}

@keyframes float{
    from{
        transform:translateY(100vh);
        opacity:0;
    }
    20%{
        opacity:1;
    }
    to{
        transform:translateY(-120px);
        opacity:0;
    }
}
</style>
</head>
<body>

<div class="card" id="card">

    <!-- Replace with your favorite teddy image -->
    <img
        class="bear"
        src="https://images.unsplash.com/photo-1545558014-8692077e9b5c?w=600"
        alt="Teddy Bear">

    <h1>Alice ❤️</h1>

    <p class="subtitle">
        This little teddy has been carrying an important question...
    </p>

    <div class="question">
        Will you go on a date with me? 🌹
    </div>

    <button id="yesBtn" onclick="yesAnswer()">
        Yes ❤️
    </button>

    <button id="noBtn" onmouseover="moveNo()">
        No 🥺
    </button>

</div>

<script>
for(let i=0;i<30;i++){
    const heart=document.createElement("div");
    heart.className="floating";
    heart.innerHTML=["💗","💕","💖","🌸"][Math.floor(Math.random()*4)];
    heart.style.left=Math.random()*100+"vw";
    heart.style.animationDuration=(4+Math.random()*5)+"s";
    document.body.appendChild(heart);
}

let count=0;

function moveNo(){
    count++;
    const btn=document.getElementById("noBtn");

    if(count<10){
        btn.style.position="fixed";
        btn.style.left=Math.random()*(window.innerWidth-120)+"px";
        btn.style.top=Math.random()*(window.innerHeight-60)+"px";
    }else{
        btn.innerHTML="Fine... Yes ❤️";
        btn.onclick=yesAnswer;
        btn.onmouseover=null;
    }
}

function yesAnswer(){
    document.body.innerHTML=`
        <div style="
            text-align:center;
            color:#8b5e66;
        ">
            <img
                src="https://www.pinterest.com/pin/1062145893390823779/"
                style="width:220px;border-radius:20px">

            <h1 style="margin-top:20px;">
                YAYYY ❤️
            </h1>

            <h2>
                Alice said YES 🌹
            </h2>

            <p style="margin-top:15px;font-size:1.2rem;">
                The teddy bears are celebrating today 🎀💕
            </p>
        </div>
    `;
}
</script>

</body>
</html>
