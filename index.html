<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Alice ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Trebuchet MS',sans-serif;
    min-height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(
        135deg,
        #f8d7da,
        #fdecef,
        #fff8f8
    );
}

.card{
    width:min(90%,700px);
    text-align:center;
    background:rgba(255,255,255,0.75);
    backdrop-filter:blur(15px);
    padding:40px;
    border-radius:35px;
    box-shadow:0 15px 40px rgba(0,0,0,.08);
    position:relative;
    z-index:5;
}

.bear{
    width:200px;
    border-radius:20px;
    margin-bottom:20px;
}

h1{
    color:#c97b84;
    font-size:3rem;
}

.subtitle{
    margin-top:10px;
    color:#9d6b73;
    font-size:1.1rem;
}

.question{
    margin:25px 0;
    color:#7a4f56;
    font-size:1.8rem;
    font-weight:700;
}

button{
    border:none;
    border-radius:999px;
    padding:15px 35px;
    margin:10px;
    cursor:pointer;
    font-size:20px;
    transition:.25s;
    font-weight:bold;
}

#yesBtn{
    background:#e5989b;
    color:white;
}

#yesBtn:hover{
    transform:scale(1.08);
}

#noBtn{
    background:white;
    color:#c97b84;
}

#score{
    margin-top:20px;
    color:#9d6b73;
    font-size:1rem;
}

.floating{
    position:absolute;
    font-size:24px;
    animation:float 7s linear infinite;
    pointer-events:none;
}

@keyframes float{
    from{
        transform:translateY(100vh);
        opacity:0;
    }
    20%{
        opacity:1;
    }
    to{
        transform:translateY(-120px);
        opacity:0;
    }
}

.toast{
    position:fixed;
    top:40px;
    left:50%;
    transform:translateX(-50%);
    background:white;
    color:#c97b84;
    padding:12px 20px;
    border-radius:999px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
    animation:fadeOut 1.8s forwards;
    z-index:999;
}

@keyframes fadeOut{
    0%{opacity:1;}
    80%{opacity:1;}
    100%{opacity:0;}
}
</style>
</head>
<body>

<div class="card" id="card">

    <img
        class="bear"
        src="https://github.com/GrystalFazer/gow/blob/main/Tiny%20Confused%20Cutie%20%F0%9F%90%BE%F0%9F%92%96.jpg"
        alt="Teddy Bear">

    <h1>Alice ❤️</h1>

    <p class="subtitle">
        This little teddy has been carrying an important question...
    </p>

    <div class="question">
        Will you go on a date with me? 🌹
    </div>

    <button id="yesBtn" onclick="yesAnswer()">
        Yes ❤️
    </button>

    <button id="noBtn" onmouseover="moveNo()">
        No 🥺
    </button>

    <div id="score">
        Teddy escapes: 0 🧸
    </div>

</div>

<script>

// Floating hearts
for(let i=0;i<35;i++){
    const heart=document.createElement("div");
    heart.className="floating";
    heart.innerHTML=["💗","💕","💖","🌸","❤️"][Math.floor(Math.random()*5)];
    heart.style.left=Math.random()*100+"vw";
    heart.style.animationDuration=(4+Math.random()*6)+"s";
    heart.style.animationDelay=Math.random()*5+"s";
    document.body.appendChild(heart);
}

let escapes=0;

const messages=[
    "Nice try 😏",
    "Too slow 🧸",
    "Almost got me 💕",
    "The teddy is protecting this button 🐻",
    "You'll have to be faster 🌸",
    "Still not caught 😌",
    "Mission failed 😆",
    "That was close 👀",
    "Not today 😝",
    "Keep trying 💗"
];

function showToast(text){
    const toast=document.createElement("div");
    toast.className="toast";
    toast.innerText=text;
    document.body.appendChild(toast);

    setTimeout(()=>{
        toast.remove();
    },1800);
}

function moveNo(){

    const btn=document.getElementById("noBtn");

    escapes++;

    document.getElementById("score").innerHTML=
        `Teddy escapes: ${escapes} 🧸`;

    showToast(
        messages[
            Math.floor(Math.random()*messages.length)
        ]
    );

    if(escapes===8){
        btn.innerHTML="Still trying? 😳";
    }

    if(escapes===15){
        btn.innerHTML="You're persistent 🥺";
    }

    if(escapes<20){

        btn.style.position="fixed";

        btn.style.left=
            Math.random()*(window.innerWidth-160)+"px";

        btn.style.top=
            Math.random()*(window.innerHeight-80)+"px";

        btn.style.transform=
            `scale(${Math.max(0.75,1-escapes*0.01)})`;

    }else{

        btn.innerHTML="Fine... you caught me 🥺";
        btn.onmouseover=null;
        btn.onclick=noAnswer;

        showToast(
            "The teddy has officially given up 😭"
        );
    }
}

function yesAnswer(){

    document.body.innerHTML=`
        <div style="
            text-align:center;
            color:#8b5e66;
            padding:40px;
        ">

            <div style="font-size:80px;">
                ❤️ 🧸 ❤️
            </div>

            <h1 style="margin-top:20px;">
                YAYYYY ❤️
            </h1>

            <h2>
                Alice said YES 🌹
            </h2>

            <p style="
                margin-top:20px;
                font-size:1.3rem;
            ">
                The teddy bears are celebrating today 🎀💕
            </p>

            <div style="
                font-size:50px;
                margin-top:25px;
            ">
                🧸💖🧸💖🧸
            </div>

        </div>
    `;
}

function noAnswer(){

    document.body.innerHTML=`
        <div style="
            text-align:center;
            color:#8b5e66;
            padding:40px;
        ">

            <div style="font-size:80px;">
                🧸🥺
            </div>

            <h1 style="margin-top:20px;">
                Oh no...
            </h1>

            <p style="
                margin-top:15px;
                font-size:1.2rem;
            ">
                The teddy is a little disappointed,
                but thanks for being honest ❤️
            </p>

        </div>
    `;
}

</script>

</body>
</html>
