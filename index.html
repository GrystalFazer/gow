```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Alice ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Trebuchet MS',sans-serif;
    min-height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(
        135deg,
        #f8d7da,
        #fdecef,
        #fff8f8
    );
}

.card{
    width:min(90%,700px);
    text-align:center;
    background:rgba(255,255,255,0.75);
    backdrop-filter:blur(15px);
    padding:40px;
    border-radius:35px;
    box-shadow:0 15px 40px rgba(0,0,0,.08);
    position:relative;
    z-index:5;
}

.kitty{
    width:220px;
    border-radius:20px;
    margin-bottom:20px;
    box-shadow:0 8px 20px rgba(0,0,0,.08);
}

h1{
    color:#c97b84;
    font-size:3rem;
}

.subtitle{
    margin-top:10px;
    color:#9d6b73;
    font-size:1.1rem;
    line-height:1.6;
}

.question{
    margin:25px 0;
    color:#7a4f56;
    font-size:1.8rem;
    font-weight:700;
}

button{
    border:none;
    border-radius:999px;
    padding:15px 35px;
    margin:10px;
    cursor:pointer;
    font-size:20px;
    transition:.25s;
    font-weight:bold;
}

#yesBtn{
    background:#e5989b;
    color:white;
}

#yesBtn:hover{
    transform:scale(1.08);
}

#noBtn{
    background:white;
    color:#c97b84;
}

#score{
    margin-top:20px;
    color:#9d6b73;
    font-size:1rem;
}

.floating{
    position:absolute;
    font-size:24px;
    animation:float 7s linear infinite;
    pointer-events:none;
}

@keyframes float{
    from{
        transform:translateY(100vh);
        opacity:0;
    }
    20%{
        opacity:1;
    }
    to{
        transform:translateY(-120px);
        opacity:0;
    }
}

.toast{
    position:fixed;
    top:40px;
    left:50%;
    transform:translateX(-50%);
    background:white;
    color:#c97b84;
    padding:12px 20px;
    border-radius:999px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
    animation:fadeOut 1.8s forwards;
    z-index:999;
}

@keyframes fadeOut{
    0%{opacity:1;}
    80%{opacity:1;}
    100%{opacity:0;}
}
</style>
</head>
<body>

<div class="card">

    <!-- Replace with your kitty image -->
    <img
        class="kitty"
        src="https://raw.githubusercontent.com/GrystalFazer/gow/main/Tiny%20Confused%20Cutie%20%F0%9F%90%BE%F0%9F%92%96.jpg"
        alt="Kitty">

    <h1>Alice ❤️</h1>

    <p class="subtitle">
        This tiny kitty has been carrying a very important question...
    </p>

    <div class="question">
        Will you go on a date with me? 🌹
    </div>

    <button id="yesBtn" onclick="yesAnswer()">
        Yes ❤️
    </button>

    <button id="noBtn" onmouseover="moveNo()">
        No 🥺
    </button>

    <div id="score">
        Kitty dodges: 0 🐾
    </div>

</div>

<script>

// Floating hearts
for(let i=0;i<40;i++){
    const heart=document.createElement("div");
    heart.className="floating";
    heart.innerHTML=["💗","💕","💖","🌸","❤️"][Math.floor(Math.random()*5)];
    heart.style.left=Math.random()*100+"vw";
    heart.style.animationDuration=(4+Math.random()*6)+"s";
    heart.style.animationDelay=Math.random()*5+"s";
    document.body.appendChild(heart);
}

let dodges=0;

const messages=[
    "hehe 😸",
    "not so fast 💕",
    "almost! 🌸",
    "the kitty says no touching 🐾",
    "you missed 😳",
    "try again 💖",
    "so close! 🥺",
    "catch me if you can 🎀",
    "that was a good attempt 😌",
    "the kitty believes in you ✨"
];

function showToast(text){

    const toast=document.createElement("div");
    toast.className="toast";
    toast.innerText=text;

    document.body.appendChild(toast);

    setTimeout(()=>{
        toast.remove();
    },1800);
}

function moveNo(){

    const btn=document.getElementById("noBtn");

    dodges++;

    document.getElementById("score").innerHTML =
        `Kitty dodges: ${dodges} 🐾`;

    showToast(
        messages[
            Math.floor(Math.random()*messages.length)
        ]
    );

    if(dodges===8){
        btn.innerHTML="Still trying? 😳";
    }

    if(dodges===15){
        btn.innerHTML="You're persistent 🥺";
    }

    if(dodges < 20){

        btn.style.position="fixed";

        btn.style.left =
            Math.random()*(window.innerWidth-180)+"px";

        btn.style.top =
            Math.random()*(window.innerHeight-80)+"px";

        btn.style.transform =
            `scale(${Math.max(0.75,1-dodges*0.01)})`;

    }else{

        btn.style.position="static";
        btn.style.transform="scale(1.05)";
        btn.style.background="#ffd6df";

        btn.innerHTML="Pretty please? 🥺💕";

        btn.onmouseover=null;

        btn.onclick=function(){

            showToast(
                "The kitty is asking very nicely... 🥺💖"
            );

            setTimeout(()=>{
                yesAnswer();
            },1000);
        };

        showToast(
            "The kitty has one final request... 💕"
        );
    }
}

function yesAnswer(){

    document.body.innerHTML=`

    <div style="
        text-align:center;
        color:#8b5e66;
        padding:40px;
    ">

        <img
            src="https://raw.githubusercontent.com/GrystalFazer/gow/main/Tiny%20Confused%20Cutie%20%F0%9F%90%BE%F0%9F%92%96.jpg"
            style="
                width:260px;
                border-radius:20px;
                box-shadow:0 8px 20px rgba(0,0,0,.08);
            "
        >

        <h1 style="margin-top:20px;">
            YAYYYY ❤️
        </h1>

        <h2>
            Alice said YES 🌹
        </h2>

        <p style="
            margin-top:20px;
            font-size:1.3rem;
        ">
            The kitty is absolutely delighted 🐾💕
        </p>

        <div style="
            font-size:50px;
            margin-top:25px;
        ">
            😸💖🐾💖😻
        </div>

    </div>
    `;
}

</script>

</body>
</html>
```
