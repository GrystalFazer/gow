<!-- <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>For Alice ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Trebuchet MS',sans-serif;
    min-height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#f8d7da,#fdecef,#fff8f8);
}

/* CARD */
.card{
    width:min(92%,700px);
    text-align:center;
    background:rgba(255,255,255,0.8);
    backdrop-filter:blur(15px);
    padding:30px;
    border-radius:30px;
    box-shadow:0 15px 40px rgba(0,0,0,.08);
    position:relative;
}

/* KITTY */
.kitty{
    width:180px;
    max-width:60vw;
    border-radius:20px;
    margin-bottom:15px;
    transition:0.3s;
}

/* TEXT */
h1{
    color:#c97b84;
    font-size:2.5rem;
}

.question{
    margin:20px 0;
    color:#7a4f56;
    font-size:1.3rem;
    font-weight:700;
}

/* BUTTONS */
button{
    border:none;
    border-radius:999px;
    padding:14px 26px;
    margin:8px;
    cursor:pointer;
    font-size:18px;
    font-weight:bold;
    transition:.2s;
    touch-action: manipulation;
}

#yesBtn{
    background:#e5989b;
    color:white;
}

#noBtn{
    background:white;
    color:#c97b84;
    position:fixed;
    z-index:999;
}

/* LOVE BAR */
.bar{
    width:100%;
    height:12px;
    background:#f5d6d9;
    border-radius:999px;
    margin-top:12px;
    overflow:hidden;
}

.fill{
    height:100%;
    width:0%;
    background:#e5989b;
    transition:0.3s;
}

/* TOAST */
.toast{
    position:fixed;
    top:30px;
    left:50%;
    transform:translateX(-50%);
    background:white;
    padding:10px 16px;
    border-radius:999px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    color:#c97b84;
    z-index:9999;
    font-size:14px;
}
</style>
</head>

<body>

<div class="card">

    <img id="kittyImg"
        class="kitty"
        src="https://raw.githubusercontent.com/GrystalFazer/gow/main/Tiny%20Confused%20Cutie.jpg">

    <h1>Aliceeyyyyyyyyyyyyyy ❤️</h1>

    <div class="question">
        Will you go on a date with me? 🌹
    </div>

    <div class="bar">
        <div class="fill" id="loveFill"></div>
    </div>

    <button id="yesBtn">Yes ❤️</button>
    <button id="noBtn">No 🥺</button>

</div>

<script>

/* IMAGES */
const images = [
    "https://raw.githubusercontent.com/GrystalFazer/gow/main/Tiny%20Confused%20Cutie.jpg", // 0 start
    "https://raw.githubusercontent.com/GrystalFazer/gow/main/kittyrose.jpg",                     // 1
    "https://raw.githubusercontent.com/GrystalFazer/gow/main/Coquette%20Kitty.jpg",        // 2
    "https://raw.githubusercontent.com/GrystalFazer/gow/main/Tiny%20Confused%20Cutie.jpg",                       // 3 (add if you have)
    "https://raw.githubusercontent.com/GrystalFazer/gow/main/Coquette%20Kitty.jpg",                       // 4 (add if you have)
    "https://raw.githubusercontent.com/GrystalFazer/gow/main/Heart%20Meme%20Funny.jpg"          // 5 final YES
];

/* preload */
images.forEach(src=>{
    const img = new Image();
    img.src = src;
});

const kitty = document.getElementById("kittyImg");
const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const loveFill = document.getElementById("loveFill");

let noCount = 0;

/* messages */
const messages = [
"hehe 😸",
"you missed me 💕",
"almost! 🌸",
"nope 🐾",
"try harder 😳",
"still running 🎀",
"catch me! 😼"
];

function showToast(text){
    const t = document.createElement("div");
    t.className = "toast";
    t.innerText = text;
    document.body.appendChild(t);
    setTimeout(()=>t.remove(),1200);
}

/* SAFE MOBILE + DESKTOP MOVE */
function moveButton(){

    const padding = 20;

    const rect = noBtn.getBoundingClientRect();

    const maxX = window.innerWidth - rect.width - padding;
    const maxY = window.innerHeight - rect.height - padding;

    const x = padding + Math.random() * Math.max(50, maxX);
    const y = padding + Math.random() * Math.max(50, maxY);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}

/* NO CLICK (works for touch + mouse) */
function handleNo(){

    noCount++;

    kitty.src = images[Math.min(noCount,4)];

    showToast(messages[Math.floor(Math.random()*messages.length)]);

    moveButton();

    loveFill.style.width = Math.min(noCount*12,100) + "%";

    noBtn.innerText = noCount > 5 ? "PLEASE 🥺" : "No 🥺";
}

/* YES */
function yesAnswer(){

    kitty.src = images[5];

    document.body.innerHTML = `
    <div style="text-align:center;color:#8b5e66;padding:40px;">
        <img src="${images[5]}" style="width:240px;border-radius:20px;">
        <h1 style="margin-top:20px;">YAYYYY ❤️</h1>
        <h2>Alice said YES 🌹</h2>
        <p style="margin-top:20px;font-size:1.2rem;">
            The kitty is very happy 🐾💕
        </p>
        <div style="font-size:45px;margin-top:20px;">
            😸💖🐾💖😻
        </div>
    </div>`;
}

/* EVENTS (IMPORTANT FOR MOBILE) */
noBtn.addEventListener("click", handleNo);
noBtn.addEventListener("touchstart", function(e){
    e.preventDefault();
    handleNo();
}, {passive:false});

yesBtn.addEventListener("click", yesAnswer);

</script>

</body>
</html> -->
