<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Alice ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Trebuchet MS',sans-serif;
    min-height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#f8d7da,#fdecef,#fff8f8);
}

.card{
    width:min(90%,700px);
    text-align:center;
    background:rgba(255,255,255,0.75);
    backdrop-filter:blur(15px);
    padding:40px;
    border-radius:35px;
    box-shadow:0 15px 40px rgba(0,0,0,.08);
}

.kitty{
    width:220px;
    border-radius:20px;
    margin-bottom:20px;
    box-shadow:0 8px 20px rgba(0,0,0,.08);
}

h1{
    color:#c97b84;
    font-size:3rem;
}

.question{
    margin:25px 0;
    color:#7a4f56;
    font-size:1.8rem;
    font-weight:700;
}

button{
    border:none;
    border-radius:999px;
    padding:15px 35px;
    margin:10px;
    cursor:pointer;
    font-size:20px;
    font-weight:bold;
    transition:.25s;
}

#yesBtn{
    background:#e5989b;
    color:white;
}

#noBtn{
    background:white;
    color:#c97b84;
}

button:hover{
    transform:scale(1.05);
}

.floating{
    position:absolute;
    font-size:24px;
    animation:float 7s linear infinite;
    pointer-events:none;
}

@keyframes float{
    from{transform:translateY(100vh);opacity:0;}
    20%{opacity:1;}
    to{transform:translateY(-120px);opacity:0;}
}
</style>
</head>
<body>

<div class="card">

    <!-- IMAGE CHANGES HERE -->
    <img id="kittyImg"
        class="kitty"
        src="IMG1.jpg"
        alt="Kitty">

    <h1>Alice ❤️</h1>

    <div class="question">
        Will you go on a date with me? 🌹
    </div>

    <button id="yesBtn" onclick="yesAnswer()">
        Yes ❤️
    </button>

    <button id="noBtn" onclick="noClick()">
        No 🥺
    </button>

</div>

<script>

// 🔁 YOUR 4 IMAGES (REPLACE THESE)
const images = [
    "https://github.com/GrystalFazer/gow/blob/main/Tiny%20Confused%20Cutie%20%F0%9F%90%BE%F0%9F%92%96.jpg", // default
    "https://github.com/GrystalFazer/gow/blob/main/kittyrose.jpg", // no click 1
    "https://github.com/GrystalFazer/gow/blob/main/Coquette%20Kitty%20%F0%9F%8E%80.jpg", // no click 2
    "https://github.com/GrystalFazer/gow/blob/main/Heart%20Meme%20Funny.jpg"  // yes final
];

let noCount = 0;

const kitty = document.getElementById("kittyImg");

// floating hearts
for(let i=0;i<30;i++){
    const h=document.createElement("div");
    h.className="floating";
    h.innerHTML=["💗","💕","💖","🌸","❤️"][Math.floor(Math.random()*5)];
    h.style.left=Math.random()*100+"vw";
    h.style.animationDuration=(4+Math.random()*6)+"s";
    document.body.appendChild(h);
}

function noClick(){

    noCount++;

    // cycle only first 3 images
    let idx = noCount % 3;
    kitty.src = images[idx];

    // small teasing shake
    kitty.style.transform = "scale(0.95)";
    setTimeout(()=>kitty.style.transform="scale(1)",200);

}

function yesAnswer(){

    kitty.src = images[3]; // 4th image

    document.body.innerHTML = `
        <div style="
            text-align:center;
            color:#8b5e66;
            padding:40px;
        ">

            <img src="${images[3]}"
                 style="width:260px;border-radius:20px;box-shadow:0 8px 20px rgba(0,0,0,.1);">

            <h1 style="margin-top:20px;">YAYYYY ❤️</h1>

            <h2>Alice said YES 🌹</h2>

            <p style="margin-top:20px;font-size:1.3rem;">
                The kitty is very happy 🐾💕
            </p>

            <div style="font-size:50px;margin-top:25px;">
                😸💖🐾💖😻
            </div>

        </div>
    `;
}

</script>

</body>
</html>
