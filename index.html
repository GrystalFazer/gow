<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Alice ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Trebuchet MS',sans-serif;
    min-height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#f8d7da,#fdecef,#fff8f8);
}

.card{
    width:min(90%,700px);
    text-align:center;
    background:rgba(255,255,255,0.75);
    backdrop-filter:blur(15px);
    padding:40px;
    border-radius:35px;
    box-shadow:0 15px 40px rgba(0,0,0,.08);
}

.kitty{
    width:220px;
    border-radius:20px;
    margin-bottom:20px;
    box-shadow:0 8px 20px rgba(0,0,0,.08);
    transition:0.25s;
}

h1{
    color:#c97b84;
    font-size:3rem;
}

.question{
    margin:25px 0;
    color:#7a4f56;
    font-size:1.8rem;
    font-weight:700;
}

button{
    border:none;
    border-radius:999px;
    padding:15px 35px;
    margin:10px;
    cursor:pointer;
    font-size:20px;
    font-weight:bold;
    transition:.2s;
}

#yesBtn{
    background:#e5989b;
    color:white;
}

#noBtn{
    background:white;
    color:#c97b84;
}

button:hover{
    transform:scale(1.05);
}

/* toast */
.toast{
    position:fixed;
    top:40px;
    left:50%;
    transform:translateX(-50%);
    background:white;
    padding:10px 18px;
    border-radius:999px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    color:#c97b84;
    z-index:999;
}
</style>
</head>
<body>

<div class="card">

    <img id="kittyImg"
        class="kitty"
        src="https://raw.githubusercontent.com/GrystalFazer/gow/main/Tiny%20Confused%20Cutie%20🐾💖.jpg"
        alt="Kitty">

    <h1>Alice ❤️</h1>

    <div class="question">
        Will you go on a date with me? 🌹
    </div>

    <button id="yesBtn" onclick="yesAnswer()">
        Yes ❤️
    </button>

    <button id="noBtn" onclick="noClick()">
        No 🥺
    </button>

</div>

<script>

/* ---------------- IMAGES (6 STEP NO GAME + YES FINAL) ---------------- */
const images = [
    "https://raw.githubusercontent.com/GrystalFazer/gow/main/Tiny%20Confused%20Cutie.jpg", // 0 start
    "https://raw.githubusercontent.com/GrystalFazer/gow/main/kittyrose.jpg",                     // 1
    "https://raw.githubusercontent.com/GrystalFazer/gow/main/Coquette%20Kitty.jpg",        // 2
    "https://raw.githubusercontent.com/GrystalFazer/gow/main/Tiny%20Confused%20Cutie.jpg",                       // 3 (add if you have)
    "https://raw.githubusercontent.com/GrystalFazer/gow/main/Coquette%20Kitty.jpg",                       // 4 (add if you have)
    "https://raw.githubusercontent.com/GrystalFazer/gow/main/Heart%20Meme%20Funny.jpg"          // 5 final YES
];

/* preload */
images.forEach(src=>{
    const img = new Image();
    img.src = src;
});

let noCount = 0;
const kitty = document.getElementById("kittyImg");

/* extended messages */
const messages = [
    "hehe 😸",
    "not so fast 💕",
    "almost! 🌸",
    "kitty says nope 🐾",
    "try again 😳",
    "so close 🥺",
    "you can't catch me 🎀",
    "still nope 😼",
    "getting closer... 👀",
    "okay you're persistent 🥺"
];

/* toast */
function showToast(text){
    const t = document.createElement("div");
    t.className = "toast";
    t.innerText = text;

    document.body.appendChild(t);
    setTimeout(()=>t.remove(),1200);
}

/* NO GAME (6+ TRIES) */
function noClick(){

    noCount++;

    // image progression up to 6 states
    let idx = Math.min(noCount, 5);
    kitty.src = images[idx];

    // message
    showToast(messages[Math.floor(Math.random()*messages.length)]);

    const btn = document.getElementById("noBtn");

    // always move for first 6+ clicks
    btn.style.position = "fixed";
    btn.style.left = Math.random() * (window.innerWidth - 120) + "px";
    btn.style.top = Math.random() * (window.innerHeight - 60) + "px";

    // slight shrink effect over time
    btn.style.transform = `scale(${Math.max(0.8,1-noCount*0.03)})`;
}

/* YES */
function yesAnswer(){

    kitty.src = images[5];

    document.body.innerHTML = `
        <div style="text-align:center;color:#8b5e66;padding:40px;">

            <img src="${images[5]}"
                style="width:260px;border-radius:20px;">

            <h1 style="margin-top:20px;">YAYYYY ❤️</h1>

            <h2>Alice said YES 🌹</h2>

            <p style="margin-top:20px;font-size:1.3rem;">
                The kitty is very happy 🐾💕
            </p>

            <div style="font-size:50px;margin-top:25px;">
                😸💖🐾💖😻
            </div>

        </div>
    `;
}

</script>

</body>
</html>
