<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Alice ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Trebuchet MS',sans-serif;
    min-height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#f8d7da,#fdecef,#fff8f8);
}

.card{
    width:min(90%,700px);
    text-align:center;
    background:rgba(255,255,255,0.75);
    backdrop-filter:blur(15px);
    padding:40px;
    border-radius:35px;
    box-shadow:0 15px 40px rgba(0,0,0,.08);
}

.kitty{
    width:220px;
    border-radius:20px;
    margin-bottom:20px;
    box-shadow:0 8px 20px rgba(0,0,0,.08);
    transition:0.2s;
}

h1{
    color:#c97b84;
    font-size:3rem;
}

.question{
    margin:25px 0;
    color:#7a4f56;
    font-size:1.8rem;
    font-weight:700;
}

button{
    border:none;
    border-radius:999px;
    padding:15px 35px;
    margin:10px;
    cursor:pointer;
    font-size:20px;
    font-weight:bold;
    transition:.2s;
}

#yesBtn{
    background:#e5989b;
    color:white;
}

#noBtn{
    background:white;
    color:#c97b84;
}

button:hover{
    transform:scale(1.05);
}
</style>
</head>
<body>

<div class="card">

    <img id="kittyImg"
        class="kitty"
        src="https://raw.githubusercontent.com/GrystalFazer/gow/main/Tiny%20Confused%20Cutie.jpg"
        alt="Kitty">

    <h1>Alice ❤️</h1>

    <div class="question">
        Will you go on a date with me? 🌹
    </div>

    <button id="yesBtn" onclick="yesAnswer()">
        Yes ❤️
    </button>

    <button id="noBtn" onclick="noClick()">
        No 🥺
    </button>

</div>

<script>

const images = [
    "https://raw.githubusercontent.com/GrystalFazer/gow/main/Tiny%20Confused%20Cutie.jpg",
    "https://raw.githubusercontent.com/GrystalFazer/gow/main/kittyrose.jpg",
    "https://raw.githubusercontent.com/GrystalFazer/gow/main/CoquetteKitty.jpg",
    "https://raw.githubusercontent.com/GrystalFazer/gow/main/HeartMeme.jpg"
];

let noCount = 0;
const kitty = document.getElementById("kittyImg");

const messages = [
    "hehe 😸",
    "not so fast 💕",
    "almost! 🌸",
    "kitty says nope 🐾",
    "try again 😳",
    "so close 🥺",
    "you can't catch me 🎀",
    "nice try 😏"
];

function showToast(text){
    const t = document.createElement("div");
    t.innerText = text;

    t.style.position = "fixed";
    t.style.top = "40px";
    t.style.left = "50%";
    t.style.transform = "translateX(-50%)";
    t.style.background = "white";
    t.style.padding = "10px 18px";
    t.style.borderRadius = "999px";
    t.style.boxShadow = "0 5px 15px rgba(0,0,0,0.1)";
    t.style.color = "#c97b84";
    t.style.zIndex = "999";

    document.body.appendChild(t);

    setTimeout(()=>t.remove(),1200);
}

function noClick(){

    noCount++;

    // change kitty image (cycle first 3)
    let idx = Math.min(noCount, 2);
    kitty.src = images[idx];

    // show message
    showToast(messages[Math.floor(Math.random()*messages.length)]);

    // MOVE BUTTON
    const btn = document.getElementById("noBtn");

    btn.style.position = "fixed";
    btn.style.left = Math.random() * (window.innerWidth - 120) + "px";
    btn.style.top = Math.random() * (window.innerHeight - 60) + "px";

    btn.style.transform = "scale(0.95)";
    setTimeout(()=>btn.style.transform="scale(1)",150);
}

function yesAnswer(){

    kitty.src = images[3];

    document.body.innerHTML = `
        <div style="text-align:center;color:#8b5e66;padding:40px;">

            <img src="${images[3]}"
                style="width:260px;border-radius:20px;">

            <h1 style="margin-top:20px;">YAYYYY ❤️</h1>

            <h2>Alice said YES 🌹</h2>

            <p style="margin-top:20px;font-size:1.3rem;">
                The kitty is very happy 🐾💕
            </p>

            <div style="font-size:50px;margin-top:25px;">
                😸💖🐾💖😻
            </div>

        </div>
    `;
}

</script>

</body>
</html>
