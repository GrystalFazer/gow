<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Alice ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: "Trebuchet MS", sans-serif;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    background:linear-gradient(
        135deg,
        #ff003c,
        #ff2d55,
        #ff5c77
    );
    position:relative;
}

/* Floating hearts */
.heart{
    position:absolute;
    font-size:24px;
    opacity:0.8;
    animation:floatUp linear infinite;
    pointer-events:none;
}

@keyframes floatUp{
    from{
        transform:translateY(100vh);
        opacity:0;
    }
    20%{
        opacity:1;
    }
    to{
        transform:translateY(-120px);
        opacity:0;
    }
}

/* Floating cats */
.cat{
    position:absolute;
    font-size:32px;
    animation:drift linear infinite;
    pointer-events:none;
}

@keyframes drift{
    from{
        transform:translateX(-100px);
    }
    to{
        transform:translateX(calc(100vw + 100px));
    }
}

.card{
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(12px);
    padding:40px;
    border-radius:30px;
    color:white;
    width:min(90%,650px);
    box-shadow:0 10px 35px rgba(0,0,0,.2);
    z-index:10;
}

.cats{
    font-size:60px;
    margin-bottom:15px;
}

h1{
    font-size:3rem;
    margin-bottom:15px;
}

.subtitle{
    font-size:1.2rem;
    margin-bottom:15px;
    opacity:.95;
}

.question{
    font-size:1.8rem;
    margin-bottom:30px;
    font-weight:bold;
}

.buttons{
    position:relative;
}

button{
    border:none;
    padding:15px 35px;
    font-size:20px;
    border-radius:999px;
    cursor:pointer;
    margin:10px;
    transition:.25s;
    font-weight:bold;
}

#yesBtn{
    background:white;
    color:#ff1744;
}

#yesBtn:hover{
    transform:scale(1.1);
}

#noBtn{
    background:#ffccd5;
    color:#c1121f;
}

#noBtn:hover{
    transform:scale(1.05);
}

.success{
    color:white;
    padding:40px;
}

.success h1{
    font-size:4rem;
}

.success p{
    font-size:1.5rem;
    margin-top:15px;
}
</style>
</head>
<body>

<div class="card" id="card">
    <div class="cats">🐱 ❤️ 🐱</div>

    <h1>Hey Alice ❤️</h1>

    <p class="subtitle">
        A very important feline committee has reached a decision...
    </p>

    <div class="question">
        Will you go on a date with me? 🌹
    </div>

    <div class="buttons">
        <button id="yesBtn" onclick="yesAnswer()">
            Yes ❤️
        </button>

        <button id="noBtn" onmouseover="moveNo()">
            No 😼
        </button>
    </div>
</div>

<script>
// Floating hearts
for(let i=0;i<35;i++){
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = ["❤️","💕","💖","💗"][Math.floor(Math.random()*4)];
    heart.style.left = Math.random()*100 + "vw";
    heart.style.animationDuration = (4 + Math.random()*6) + "s";
    heart.style.animationDelay = Math.random()*5 + "s";
    heart.style.fontSize = (20 + Math.random()*20) + "px";
    document.body.appendChild(heart);
}

// Floating cats
const catEmojis = ["🐱","😺","😸","😻","🐈"];

for(let i=0;i<12;i++){
    const cat = document.createElement("div");
    cat.className = "cat";
    cat.innerHTML = catEmojis[Math.floor(Math.random()*catEmojis.length)];
    cat.style.top = Math.random()*90 + "vh";
    cat.style.animationDuration = (15 + Math.random()*15) + "s";
    cat.style.animationDelay = Math.random()*10 + "s";
    document.body.appendChild(cat);
}

let count = 0;

function moveNo(){
    count++;

    const btn = document.getElementById("noBtn");

    if(count < 10){
        btn.style.position = "fixed";
        btn.style.left =
            Math.random() * (window.innerWidth - 120) + "px";
        btn.style.top =
            Math.random() * (window.innerHeight - 60) + "px";
    }else{
        btn.innerHTML = "Okay... Yes ❤️";
        btn.onclick = yesAnswer;
        btn.onmouseover = null;
    }
}

function yesAnswer(){
    document.body.innerHTML = `
        <div class="success">
            <div style="font-size:100px;">
                🐱 ❤️ 😻 ❤️ 🐱
            </div>

            <h1>YAYYYY! ❤️</h1>

            <p>
                Alice said YES! 🌹
            </p>

            <p>
                The feline committee is extremely pleased. 😸
            </p>

            <div style="font-size:70px; margin-top:25px;">
                🐾 ❤️ 🐾 ❤️ 🐾
            </div>
        </div>
    `;

    document.body.style.background =
        "linear-gradient(135deg,#ff003c,#ff1744,#ff5c77)";
}
</script>

</body>
</html>
